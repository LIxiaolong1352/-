<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
    <title>小弟连点器</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>🫡 小弟连点器</h1>
        <p>v1.0.0</p>
    </div>

    <div class="status">
        <div class="status-text stopped" id="statusText">状态: 已停止</div>
    </div>

    <div class="control-panel">
        <div class="speed-control">
            <label>点击速度: <span class="speed-value" id="speedValue">10</span> 次/秒</label>
            <input type="range" id="speedRange" min="1" max="50" value="10">
        </div>
        <button class="btn btn-start" id="toggleBtn">开始连点</button>
    </div>

    <div class="info">
        <h3>使用说明</h3>
        <p>1. 设置点击速度（1-50次/秒）</p>
        <p>2. 点击"开始连点"按钮</p>
        <p>3. 切换到需要点击的页面</p>
        <p>4. 点击悬浮按钮开始自动点击</p>
        <p>5. 再次点击停止</p>
    </div>

    <button class="floating-btn" id="floatingBtn">⚡</button>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/app.js"></script>
</body>
</html>
